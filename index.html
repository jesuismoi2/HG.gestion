function Btn({ children, v="primary", onClick, style={}, full=false }) {
  const [h, setH] = useState(false);

    padding:"9px 20px", borderRadius:8, fontSize:13,

    ghost:   { background:h?C.bg:"transparent", color:C.textSec, border:`1.5px solid ${C.border}` },
    outline: { background:h?C.primary:"transparent", color:h?"#fff":C.primary, border:`1.5px solid ${C.primary}` },
    danger:  { background:h?"#9B2C2C":C.rouge, color:"#fff" },
  };
  return (
    <button onClick={onClick} style={{...base,...V[v],...style}}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}>
      {children}
    </button>

}

function Input({ label, value, onChange, placeholder, type="text", note }) {
  const [f, setF] = useState(false);
  return (

      {note && <span style={{fontSize:11,color:C.textMuted}}>{note}</span>}

}

function Card({ children, style={} }) {
  return (
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,0.06)",overflow:"hidden",...style}}>

function Toast({ msg, type }) {
  const colors = { success:C.green, error:C.rouge, warning:C.orange };
  return (
    <div style={{position:"fixed",bottom:24,right:24,zIndex:600,background:C.text,color:"#fff",padding:"14px 20px",borderRadius:10,boxShadow:"0 8px 30px rgba(0,0,0,0.2)",fontSize:13,display:"flex",alignItems:"center",gap:10,borderLeft:`4px solid ${colors[type]||C.green}`,maxWidth:340,animation:"toastIn 0.3s ease"}}>
      <span style={{color:colors[type]||C.green,fontWeight:700}}>{type==="success"?"✓":type==="error"?"✕":"!"}</span>
      <span>{msg}</span>
    </div>
  );
}

// Graphique camembert SVG simple
function PieChart({ data, size=120 }) {
  let cumul = 0;
  const total = data.reduce((a,d)=>a+d.value,0);
  const slices = data.map(d => {
    const start = cumul / total * 360;
    const angle = d.value / total * 360;
    cumul += d.value;
    return { ...d, start, angle };
  });

  function slice(start, angle, r=46, cx=60, cy=60) {
    const s = (start - 90) * Math.PI / 180;
    const e = (start + angle - 90) * Math.PI / 180;
    const x1 = cx + r * Math.cos(s), y1 = cy + r * Math.sin(s);
    const x2 = cx + r * Math.cos(e), y2 = cy + r * Math.sin(e);
    const large = angle > 180 ? 1 : 0;
    return `M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${large},1 ${x2},${y2} Z`;
  }

  return (
    <svg width={size} height={size} viewBox="0 0 120 120">
      <circle cx="60" cy="60" r="46" fill={C.border}/>
      {slices.map((s,i) => (
        <path key={i} d={slice(s.start, s.angle)} fill={s.color} opacity="0.9"/>
      ))}
      <circle cx="60" cy="60" r="28" fill={C.surface}/>
    </svg>
  );
}

                {["Trajet","Véhicule","Société","Date","Statut","Montant","Action"].map(h=>(
                  <th key={h} style={{padding:"10px 18px",fontSize:11,fontWeight:600,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.07em",textAlign:"left",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colSpan={7}>
                  <EmptyState
                    title="Aucune mission pour le moment"
                    subtitle="Créez votre première mission en cliquant sur le bouton + Nouvelle mission"
                  />
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </Card>
    </div>
  );
}

// ============================================================
// MODAL NOUVELLE MISSION — plein écran par-dessus le dashboard
// DÉVELOPPEUR : remplacer YOUR_GOOGLE_MAPS_API_KEY par la vraie clé
// ============================================================
function ModalNouvelleMission({ onClose, showToast }) {
  const [step,setStep]             = useState(1);
  const [depart,setDepart]         = useState("");
  const [arrivee,setArrivee]       = useState("");
  const [immat,setImmat]           = useState("");
  const [marque,setMarque]         = useState("");
  const [prests,setPrests]         = useState({docs:true});
  const [dateMode,setDateMode]     = useState("fixe");
  const [dateFixe,setDateFixe]     = useState("");
  const [heureMode,setHeureMode]   = useState("journee");
  const [heureDebut,setHeureDebut] = useState("");
  const [heureFin,setHeureFin]     = useState("");
  const [dateDebut,setDateDebut]   = useState("");
  const [dateFin,setDateFin]       = useState("");
  const [dateLimite,setDateLimite] = useState("");
  const [distanceKm,setDistanceKm] = useState(null);
  const [duree,setDuree]           = useState(null);
  const [calcul,setCalcul]         = useState(false);

  const now = new Date();
  const moisAnnee = String(now.getMonth()+1).padStart(2,"0")+String(now.getFullYear()).slice(-2);
  const missionRef = `#AVA-${moisAnnee}-HC-001`;

  const toggle = k => setPrests(p=>({...p,[k]:!p[k]}));
  const base  = 350;
  const extra = PRESTS.filter(p=>prests[p.key]&&!p.inclus).reduce((a,p)=>a+p.prix,0);
  const total = base+extra;
  const ttc   = (total*1.2).toFixed(2).replace(".",",");
  const STEPS = ["Trajet & véhicule","Prestations","Récapitulatif","Confirmation"];
  const dateOk = dateMode==="fixe"?!!dateFixe:dateMode==="plage"?(!!dateDebut&&!!dateFin):true;

  function calculerDistance() {
    if(!depart||!arrivee) return;
    setCalcul(true);
    // [DEV] Brancher Google Maps Distance Matrix API ici (sans departure_time = distance fixe)
    // new google.maps.DistanceMatrixService().getDistanceMatrix({origins:[depart],destinations:[arrivee],travelMode:'DRIVING'},(r,s)=>{...})
    setTimeout(()=>{ setDistanceKm(412); setDuree("4h15"); setCalcul(false); },800);
  }

  const next = () => {
    if(step===1&&(!depart||!arrivee||!dateOk)){showToast("Veuillez renseigner le trajet et les disponibilités.","error");return;}
    if(step===1&&!distanceKm) calculerDistance();
    if(step===3) showToast("Mission envoyée avec succès !","success");
    setStep(s=>Math.min(s+1,4));
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.65)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(3px)"}}>
      <div style={{background:C.bg,borderRadius:16,width:"100%",maxWidth:820,maxHeight:"92vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 64px rgba(0,0,0,0.28)",overflow:"hidden"}}>

        {/* Header */}
        <div style={{background:C.surface,padding:"16px 28px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
          <div>
            <div style={{fontFamily:"Syne,sans-serif",fontSize:17,fontWeight:700,color:C.text}}>Nouvelle mission</div>
            <div style={{fontSize:12,color:C.textMuted,marginTop:1}}>Renseignez les informations pour générer votre devis</div>
          </div>
          <button onClick={onClose} style={{width:34,height:34,borderRadius:8,background:C.bg,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:15,color:C.textSec,fontWeight:700}}
            onMouseEnter={e=>e.currentTarget.style.background=C.border}
            onMouseLeave={e=>e.currentTarget.style.background=C.bg}>✕</button>
        </div>

        {/* Stepper */}
        <div style={{background:C.surface,padding:"12px 28px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",flexShrink:0}}>
          {STEPS.map((label,i)=>{
            const n=i+1,done=n<step,active=n===step;
            return(
              <div key={n} style={{display:"flex",alignItems:"center",flex:n<STEPS.length?1:0}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}>
                  <div style={{width:24,height:24,borderRadius:"50%",background:done?C.green:active?C.primary:"transparent",border:`2px solid ${done?C.green:active?C.primary:C.border}`,color:done||active?"#fff":C.textMuted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,flexShrink:0,transition:"all 0.3s"}}>{done?"✓":n}</div>
                  <span style={{fontSize:11,fontWeight:active?600:400,color:active?C.primary:done?C.green:C.textMuted,whiteSpace:"nowrap"}}>{label}</span>
                </div>
                {n<STEPS.length&&<div style={{flex:1,height:2,background:done?C.green:C.border,margin:"0 8px",transition:"background 0.4s"}}/>}
              </div>
            );
          })}
        </div>

        {/* Contenu scrollable */}
        <div style={{flex:1,overflowY:"auto",padding:28}}>

          {/* ÉTAPE 1 */}
          {step===1&&(
            <div style={{display:"flex",flexDirection:"column",gap:20}}>
              <div style={{fontSize:11,fontWeight:700,color:C.primary,textTransform:"uppercase",letterSpacing:"0.1em"}}>Trajet</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  <label style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.05em"}}>Adresse de départ</label>
                  {/* [DEV] Brancher Google Places Autocomplete sur cet input */}
                  <input value={depart} onChange={e=>setDepart(e.target.value)} onBlur={()=>{if(depart&&arrivee)calculerDistance();}} placeholder="Ex : 1 rue de Lyon, 51100 Reims"
                    style={{padding:"11px 14px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,width:"100%",fontFamily:"Inter,sans-serif"}}
                    onFocus={e=>e.target.style.borderColor=C.accent} />
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:5}}>
                  <label style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.05em"}}>Adresse d'arrivée</label>
                  {/* [DEV] Brancher Google Places Autocomplete sur cet input */}
                  <input value={arrivee} onChange={e=>setArrivee(e.target.value)} onBlur={()=>{if(depart&&arrivee)calculerDistance();}} placeholder="Ex : 14 avenue Foch, 13008 Marseille"
                    style={{padding:"11px 14px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,width:"100%",fontFamily:"Inter,sans-serif"}}
                    onFocus={e=>e.target.style.borderColor=C.accent} />
                </div>
              </div>

              {calcul&&<div style={{display:"inline-flex",alignItems:"center",gap:8,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 16px",fontSize:13,color:C.textMuted}}>Calcul de la distance en cours...</div>}
              {distanceKm&&!calcul&&(
                <div style={{display:"inline-flex",alignItems:"center",gap:20,background:C.primaryLight,border:`1px solid ${C.accent}33`,borderRadius:8,padding:"12px 18px"}}>
                  <div><div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>Distance</div><div style={{fontFamily:"Syne,sans-serif",fontSize:18,fontWeight:700,color:C.primary}}>{distanceKm} km</div></div>
                  <div style={{width:1,height:32,background:C.border}}/>
                  <div><div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>Durée estimée</div><div style={{fontFamily:"Syne,sans-serif",fontSize:18,fontWeight:700,color:C.primary}}>{duree}</div></div>
                  <div style={{width:1,height:32,background:C.border}}/>
                  <div><div style={{fontSize:11,color:C.textMuted,marginBottom:2}}>Tranche tarifaire</div><div style={{fontSize:13,fontWeight:600,color:C.textSec}}>400–500 km</div></div>
                </div>
              )}

              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:18}}>
                <div style={{fontSize:11,fontWeight:700,color:C.primary,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:14}}>Véhicule</div>
                <div style={{display:"grid",gridTemplateColumns:"180px 1fr",gap:16}}>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    <label style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.05em"}}>Immatriculation</label>
                    <input value={immat} onChange={e=>setImmat(e.target.value.toUpperCase())} placeholder="AB-123-CD" maxLength={9}
                      style={{padding:"11px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,fontFamily:"Inter,sans-serif"}}
                      onFocus={e=>e.target.style.borderColor=C.accent}
                      onBlur={e=>{e.target.style.borderColor=C.border; if(immat.length>=7)setMarque("Peugeot 3008 (simulé)");}} />
                    <span style={{fontSize:11,color:C.textMuted}}>Détection auto du véhicule</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    <label style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.05em"}}>Marque & modèle</label>
                    <input value={marque} onChange={e=>setMarque(e.target.value)} placeholder="Rempli automatiquement"
                      style={{padding:"11px 14px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:immat.length>=7?C.surface:C.bg,fontFamily:"Inter,sans-serif"}}
                      onFocus={e=>e.target.style.borderColor=C.accent}
                      onBlur={e=>e.target.style.borderColor=C.border} />
                    {immat.length>=7&&<span style={{fontSize:11,color:C.green}}>✓ Véhicule détecté — modifiable si incorrect</span>}
                  </div>
                </div>
              </div>

              <div style={{borderTop:`1px solid ${C.border}`,paddingTop:18}}>
                <div style={{fontSize:11,fontWeight:700,color:C.primary,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:12}}>Disponibilités</div>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  {[{key:"fixe",label:"Date fixe"},{key:"plage",label:"Plage de dates"},{key:"libre",label:"Flexible"}].map(m=>(
                    <button key={m.key} onClick={()=>setDateMode(m.key)}
                      style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:600,border:`1.5px solid ${dateMode===m.key?C.primary:C.border}`,background:dateMode===m.key?C.primaryLight:"transparent",color:dateMode===m.key?C.primary:C.textSec,cursor:"pointer",fontFamily:"Inter,sans-serif",transition:"all 0.15s"}}>
                      {m.label}
                    </button>
                  ))}
                </div>

                {dateMode==="fixe"&&(
                  <div style={{display:"flex",flexDirection:"column",gap:12}}>
                    <div style={{maxWidth:190}}>
                      <label style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:5}}>Date souhaitée</label>
                      <input type="date" value={dateFixe} onChange={e=>setDateFixe(e.target.value)}
                        style={{padding:"10px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,fontFamily:"Inter,sans-serif",width:"100%"}}
                        onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
                    </div>
                    <div>
                      <label style={{fontSize:11,fontWeight:700,color:C.textSec,textTransform:"uppercase",letterSpacing:"0.05em",display:"block",marginBottom:8}}>Horaire</label>
                      <div style={{display:"flex",gap:8,marginBottom:10}}>
                        {[{key:"journee",label:"Toute la journée"},{key:"plage",label:"Plage horaire"}].map(m=>(
                          <button key={m.key} onClick={()=>setHeureMode(m.key)}
                            style={{padding:"6px 14px",borderRadius:8,fontSize:12,fontWeight:600,border:`1.5px solid ${heureMode===m.key?C.primary:C.border}`,background:heureMode===m.key?C.primaryLight:"transparent",color:heureMode===m.key?C.primary:C.textSec,cursor:"pointer",fontFamily:"Inter,sans-serif"}}>
                            {m.label}
                          </button>
                        ))}
                      </div>
                      {heureMode==="plage"&&(
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div><label style={{fontSize:11,color:C.textMuted,display:"block",marginBottom:4}}>De</label>
                          <input type="time" value={heureDebut} onChange={e=>setHeureDebut(e.target.value)}
                            style={{padding:"9px 10px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,width:105,fontFamily:"Inter,sans-serif"}}/></div>
                          <div style={{marginTop:14,color:C.textMuted,fontWeight:700}}>→</div>
                          <div><label style={{fontSize:11,color:C.textMuted,display:"block",marginBottom:4}}>À</label>
                          <input type="time" value={heureFin} onChange={e=>setHeureFin(e.target.value)}
                            style={{padding:"9px 10px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,width:105,fontFamily:"Inter,sans-serif"}}/></div>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {dateMode==="plage"&&(
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div><label style={{fontSize:11,color:C.textMuted,display:"block",marginBottom:4}}>Du</label>
                    <input type="date" value={dateDebut} onChange={e=>setDateDebut(e.target.value)}
                      style={{padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,fontFamily:"Inter,sans-serif"}}/></div>
                    <div style={{marginTop:14,color:C.textMuted,fontWeight:700}}>→</div>
                    <div><label style={{fontSize:11,color:C.textMuted,display:"block",marginBottom:4}}>Au</label>
                    <input type="date" value={dateFin} onChange={e=>setDateFin(e.target.value)}
                      style={{padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,fontFamily:"Inter,sans-serif"}}/></div>
                  </div>
                )}

                {dateMode==="libre"&&(
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    <div style={{background:C.primaryLight,border:`1px solid ${C.accent}33`,borderRadius:8,padding:"11px 14px",fontSize:13,color:C.textSec}}>
                      Aucune contrainte — Hexagone Confluence vous contactera pour fixer la date.
                    </div>
                    <div><label style={{fontSize:11,color:C.textMuted,display:"block",marginBottom:4}}>Date limite (optionnel)</label>
                    <input type="date" value={dateLimite} onChange={e=>setDateLimite(e.target.value)}
                      style={{padding:"9px 12px",border:`1.5px solid ${C.border}`,borderRadius:8,fontSize:13,color:C.text,outline:"none",background:C.surface,fontFamily:"Inter,sans-serif"}}/></div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* ÉTAPE 2 */}
          {step===2&&(
            <div>
              <div style={{fontSize:11,fontWeight:700,color:C.primary,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:16}}>Prestations souhaitées</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
                {PRESTS.map(p=>{const sel=prests[p.key];return(
                  <div key={p.key} onClick={()=>toggle(p.key)}
                    style={{border:`1.5px solid ${sel?C.primary:C.border}`,background:sel?C.primaryLight:C.surface,borderRadius:10,padding:"14px 16px",cursor:"pointer",transition:"all 0.15s",position:"relative",userSelect:"none"}}>
                    {sel&&<div style={{position:"absolute",top:10,right:10,width:18,height:18,background:C.primary,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:10,fontWeight:700}}>✓</div>}
                    <div style={{fontSize:13,fontWeight:600,color:sel?C.primary:C.text,marginBottom:4}}>{p.label}</div>
                    <div style={{fontSize:12,fontWeight:700,color:p.inclus?C.textMuted:C.accent}}>{p.inclus?"Inclus":`+${p.prix} €`}</div>
                  </div>
                );})}
              </div>
            </div>
          )}

          {/* ÉTAPE 3 */}
          {step===3&&(
            <div style={{display:"flex",flexDirection:"column",gap:14}}>
              <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16}}>
                <div style={{fontFamily:"Syne,sans-serif",fontSize:16,fontWeight:700,color:C.text,marginBottom:5}}>
                  {depart||"—"} → {arrivee||"—"}
                  {distanceKm&&<span style={{fontSize:12,fontWeight:400,color:C.textMuted,marginLeft:8}}>· {distanceKm} km · {duree} estimé</span>}
                </div>
                <div style={{fontSize:13,color:C.textSec}}>
                  {dateMode==="fixe"?`${dateFixe}${heureMode==="plage"&&heureDebut?` · De ${heureDebut} à ${heureFin}`:""}`
                  :dateMode==="plage"?`Du ${dateDebut} au ${dateFin}`
                  :`Flexible${dateLimite?` · avant le ${dateLimite}`:""}`}
                  {marque&&` · ${marque}`}{immat&&` · ${immat}`}
                </div>
              </div>
              <div style={{border:`1px solid ${C.border}`,borderRadius:10,overflow:"hidden"}}>
                <div style={{display:"flex",justifyContent:"space-between",padding:"11px 16px",borderBottom:`1px solid ${C.border}`,fontSize:13,color:C.textSec}}>
                  <span>Convoyage {distanceKm?`(${distanceKm} km)`:""}</span><strong style={{color:C.text}}>{base} € HT</strong>
                </div>
                {PRESTS.filter(p=>prests[p.key]).map(p=>(
                  <div key={p.key} style={{display:"flex",justifyContent:"space-between",padding:"11px 16px",borderBottom:`1px solid ${C.border}`,fontSize:13,color:C.textSec}}>
                    <span>{p.label}</span><strong style={{color:p.inclus?C.green:C.text}}>{p.inclus?"Inclus":`+${p.prix} € HT`}</strong>
                  </div>
                ))}
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px"}}>
                  <div>
                    <div style={{fontSize:11,fontWeight:700,color:C.textMuted,textTransform:"uppercase",letterSpacing:"0.08em"}}>Total estimé</div>
                    <div style={{fontSize:11,color:C.textMuted,marginTop:2}}>Soit {ttc} € TTC</div>
                  </div>
                  <div style={{fontFamily:"Syne,sans-serif",fontSize:28,fontWeight:700,color:C.primary}}>{total} € HT</div>
                </div>
              </div>
              <div style={{background:"#FFFBEB",border:"1px solid #F6E05E",borderRadius:8,padding:"11px 14px",fontSize:12,color:"#744210"}}>
                <strong>Conditions d'annulation :</strong> Plus de 48h : gratuite · Entre 24h et 48h : 30% · Jour J : 60%
              </div>
            </div>
          )}

          {/* ÉTAPE 4 */}
          {step===4&&(
            <div style={{textAlign:"center",padding:"20px 0"}}>
              <div style={{width:52,height:52,borderRadius:"50%",background:C.greenBg,border:`2px solid ${C.green}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:20,color:C.green,fontWeight:700}}>✓</div>
              <h2 style={{fontFamily:"Syne,sans-serif",fontSize:22,fontWeight:700,color:C.text,marginBottom:8}}>Mission envoyée</h2>
              <p style={{fontSize:13,color:C.textSec,maxWidth:380,margin:"0 auto 20px"}}>
                Votre demande a été transmise à Hexagone Confluence. Vous recevrez une confirmation dès qu'un convoyeur sera assigné.
              </p>
              <div style={{display:"inline-flex",alignItems:"center",gap:10,background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 18px",marginBottom:24}}>
                <span style={{fontSize:12,color:C.textMuted}}>Référence mission</span>
                {/* [DEV] FORMAT : #[INITIALES_DO]-[MMAA]-[INITIALES_SC]-[NNN] — générer depuis la BDD */}
                <strong style={{fontFamily:"Syne,sans-serif",fontSize:15,color:C.primary}}>{missionRef}</strong>
              </div>
              <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
                <Btn v="outline" onClick={()=>showToast("PDF — à brancher côté développeur","success")}>Télécharger le bon de commande</Btn>
                <Btn onClick={onClose}>Retour au tableau de bord</Btn>
              </div>
            </div>
          )}
        </div>

        {/* Footer navigation */}
        {step<4&&(
          <div style={{background:C.surface,padding:"13px 28px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
            <span style={{fontSize:12,color:C.textMuted}}>Étape {step} sur {STEPS.length-1}</span>
            <div style={{display:"flex",gap:10}}>
              {step>1&&<Btn v="ghost" onClick={()=>setStep(s=>s-1)}>← Retour</Btn>}
              <Btn onClick={next}>{step===3?"Valider et envoyer":"Suivant →"}</Btn>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// APP
// ============================================================
function App() {
  const [page,  setPage]   = useState("dashboard");
  const [modal, setModal]  = useState(false);
  const [toast, setToast]  = useState(null);

  function showToast(msg, type="success") {
    setToast({msg,type});
    setTimeout(()=>setToast(null),3500);
  }

  // Ouvrir la modal nouvelle mission (depuis sidebar OU topbar)
  function ouvrirNouvelle() {
    if(page==="nouvelle") return;
    setModal(true);
  }

  // Intercepter le clic "nouvelle" dans la sidebar
  function handleNav(key) {
    if(key==="nouvelle") { setModal(true); return; }
    setPage(key);
  }

  const PAGES = {
    dashboard:   <Dashboard setPage={handleNav} showToast={showToast}/>,
    en_cours:    <Placeholder title="Missions en cours"/>,
    terminees:   <Placeholder title="Missions terminées"/>,
    passees:     <Placeholder title="Missions passées"/>,
    a_venir:     <Placeholder title="Missions à venir"/>,
    documents:   <Placeholder title="Documents"/>,
    societes:    <Placeholder title="Mes sociétés"/>,
    facturation: <Placeholder title="Facturation"/>,
    reclamations:<Placeholder title="Réclamations"/>,
    admins:      <Placeholder title="Gérer mes accès"/>,
    parametres:  <Placeholder title="Paramètres"/>,
  };

  return (
    <div style={{display:"flex",minHeight:"100vh",fontFamily:"Inter,sans-serif",background:C.bg}}>
      <Sidebar page={page} setPage={handleNav}/>
      <div style={{flex:1,marginLeft:236}}>
        <Topbar showToast={showToast} setPage={ouvrirNouvelle}/>
        <main style={{padding:"80px 28px 48px"}}>
          {PAGES[page]||<Placeholder title={page}/>}
        </main>
      </div>
      {modal&&<ModalNouvelleMission onClose={()=>setModal(false)} showToast={showToast}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
        * { box-sizing:border-box; margin:0; padding:0; }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
